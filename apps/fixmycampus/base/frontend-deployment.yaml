apiVersion: apps/v1
kind: Deployment
metadata:
  name: fixmycampus-client
  labels:
    app: fixmycampus
    component: client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fixmycampus
      component: client
  template:
    metadata:
      labels:
        app: fixmycampus
        component: client
    spec:
      containers:
        - name: client
          image: ghcr.io/alexmchughdev/fixmycampus-client:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
