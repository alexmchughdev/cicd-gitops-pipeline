# Placeholder secret. Do NOT commit the real Atlas connection string.
# Apply the real value out-of-band:
#
#   kubectl -n fixmycampus create secret generic fixmycampus-secrets \
#     --from-literal=MONGO_URI='mongodb+srv://...' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# The ArgoCD Application is configured with
# `syncOptions: [RespectIgnoreDifferences=true]` and an
# ignoreDifferences rule on stringData/data so subsequent syncs do not
# overwrite the real value with this placeholder.
apiVersion: v1
kind: Secret
metadata:
  name: fixmycampus-secrets
type: Opaque
stringData:
  MONGO_URI: REPLACE_ME_VIA_KUBECTL
