apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fixmycampus-client
  labels:
    app: fixmycampus
    component: client
  annotations:
    # TLS is terminated by Cloudflare at the edge; traffic from cloudflared
    # to the ingress controller stays on HTTP to avoid a redirect loop.
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: fixmycampus.alexmchugh.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fixmycampus-client
                port:
                  number: 80
