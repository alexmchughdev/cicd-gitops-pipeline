apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alexmchugh-dev
  labels:
    app: alexmchugh-dev
  annotations:
    # TLS is terminated by Cloudflare at the edge; traffic from cloudflared
    # to the ingress controller stays on HTTP to avoid a redirect loop.
    # Re-add `cert-manager.io/cluster-issuer` + `force-ssl-redirect` and a
    # `tls` block below if/when you move off the Cloudflare Tunnel.
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: alexmchugh.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alexmchugh-dev
                port:
                  number: 80
